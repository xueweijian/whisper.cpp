name: Build Cross-Platform CLI (GPU)

on:
  workflow_dispatch:

jobs:
  build-windows-vulkan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vulkan SDK
        run: choco install vulkan-sdk --no-progress
      - name: Configure CMake
        run: cmake -B build -DWHISPER_VULKAN=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Package
        run: |
          mkdir release_package
          if (Test-Path build\bin\Release\main.exe) { copy build\bin\Release\main.exe release_package\cli-windows-vulkan.exe }
          if (Test-Path build\bin\Release\whisper-cli.exe) { copy build\bin\Release\whisper-cli.exe release_package\cli-windows-vulkan.exe }
          if (Test-Path build\bin\Release\*.dll) { copy build\bin\Release\*.dll release_package\ }
      - uses: actions/upload-artifact@v4
        with:
          name: cli-windows-vulkan
          path: release_package/

  build-macos-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build -DWHISPER_METAL=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Package
        run: |
          mkdir release_package
          cp build/bin/main release_package/cli-macos-metal || true
          cp build/bin/whisper-cli release_package/cli-macos-metal || true
          cp build/bin/*.dylib release_package/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-macos-metal
          path: release_package/

  build-linux-vulkan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vulkan SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev glslc
      - name: Configure CMake
        run: cmake -B build -DWHISPER_VULKAN=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Package
        run: |
          mkdir release_package
          cp build/bin/main release_package/cli-linux-vulkan || true
          cp build/bin/whisper-cli release_package/cli-linux-vulkan || true
          cp build/bin/*.so release_package/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-vulkan
          path: release_package/
